{% extends 'core/base.html' %}

{% block content %}
<div class="pt-24 pb-12 px-4 max-w-4xl mx-auto">
    
    <!-- Header -->
    <div class="text-center mb-10">
        <div class="inline-flex items-center justify-center w-20 h-20 bg-purple-100 rounded-full mb-6 animate-pulse shadow-inner">
            <i data-lucide="sparkles" class="w-10 h-10 text-purple-600"></i>
        </div>
        <h1 class="text-4xl font-extrabold text-gray-800 mb-2">AI Health Coach</h1>
        <p class="text-xl text-gray-500 font-medium">Personalized insights powered by Artificial Intelligence.</p>
    </div>

    <!-- AI Response Card -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-purple-100">
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 p-6 text-white flex items-center gap-3">
            <i data-lucide="bot" class="w-8 h-8"></i>
            <h2 class="text-xl font-bold">Coach's Analysis</h2>
        </div>
        
        <div class="p-8 prose prose-lg max-w-none text-gray-700 leading-relaxed font-medium">
            {% if error %}
                <div class="bg-red-50 text-red-600 p-6 rounded-xl border border-red-200 text-center font-bold shadow-sm">
                    <i data-lucide="alert-circle" class="w-8 h-8 mx-auto mb-2 opacity-80"></i>
                    {{ error }}
                </div>
                <div class="mt-8 text-center">
                    <a href="{% url 'add_log' %}" class="px-8 py-4 bg-gradient-to-r from-teal-500 to-emerald-600 text-white rounded-xl font-bold hover:shadow-lg hover:-translate-y-0.5 transition-all inline-flex items-center gap-2">
                        <i data-lucide="file-plus-2" class="w-5 h-5"></i> Log Data Now
                    </a>
                </div>
            {% else %}
                <!-- Render AI HTML safely -->
                {{ ai_response|safe }}
            {% endif %}
        </div>
        
        <div class="bg-gray-50 p-6 border-t border-gray-100 text-center">
            <a href="{% url 'dashboard' %}" class="px-8 py-3 bg-white border border-gray-200 text-gray-700 rounded-xl font-bold hover:bg-gray-50 hover:text-teal-600 transition-all shadow-sm inline-flex items-center gap-2">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Dashboard
            </a>
        </div>
    </div>
</div>

<!-- Extra styles so the HTML generated by the AI looks beautiful and matches the theme -->
<style>
    .prose h3 { color: #4f46e5; font-weight: 900; margin-top: 1.5rem; margin-bottom: 0.75rem; font-size: 1.25rem; }
    .prose p { margin-bottom: 1rem; }
    .prose ul { list-style-type: disc; padding-left: 1.5rem; margin-bottom: 1.5rem; }
    .prose li { margin-bottom: 0.5rem; }
    .prose strong { color: #1f2937; }
    
    /* Dark mode overrides for the AI text */
    body.dark-theme .prose { color: #cbd5e1; }
    body.dark-theme .prose h3 { color: #818cf8; }
    body.dark-theme .prose strong { color: #f8fafc; }
</style>
{% endblock %}
