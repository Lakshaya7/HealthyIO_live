{% extends 'core/base.html' %}

{% block content %}
<div class="pt-24 pb-12 px-4 max-w-7xl mx-auto">
    <div class="text-center mb-16">
        <h2 class="text-4xl font-black text-gray-800 tracking-tight mb-4">Health Insights 💡</h2>
        <p class="text-xl text-gray-500 font-medium max-w-2xl mx-auto">
            Small daily habits lead to massive long-term changes. Here is your guide to a healthier lifestyle.
        </p>
    </div>

    <!-- Grid Layout -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        {% for tip in tips %}
        <div class="bg-white p-8 rounded-[2rem] shadow-xl hover:shadow-2xl hover:-translate-y-2 transition-all duration-300 border border-gray-100 group">
            
            <div class="w-16 h-16 rounded-2xl bg-gray-50 flex items-center justify-center mb-6 group-hover:bg-{{ tip.color }}-50 group-hover:scale-110 transition-all duration-300 shadow-inner">
                <i data-lucide="{{ tip.icon }}" class="w-8 h-8 text-{{ tip.color }}-600"></i>
            </div>
            
            <h3 class="text-2xl font-bold text-gray-800 mb-3 group-hover:text-{{ tip.color }}-600 transition-colors">{{ tip.title }}</h3>
            <p class="text-gray-500 leading-relaxed font-medium">{{ tip.desc }}</p>
            
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
