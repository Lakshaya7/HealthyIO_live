{% extends 'core/base.html' %}

{% block content %}
<div class="min-h-screen pt-24 pb-12 px-4 transition-colors duration-300">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div class="text-center md:text-left">
                <h1 class="text-4xl font-black text-gray-800 tracking-tight">Nutri-Catch! 🍎</h1>
                <p class="text-gray-500 font-medium mt-2">Catch healthy foods, avoid junk food. Use Left/Right arrows or tap the screen sides.</p>
            </div>
            
            <div class="bg-white px-8 py-4 rounded-3xl shadow-xl border border-gray-100 text-center min-w-[150px] transition-colors duration-300">
                <span class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-1">Score</span>
                <span id="scoreDisplay" class="text-4xl font-black text-teal-600 drop-shadow-sm">0</span>
            </div>
        </div>

        <!-- Game Canvas Container -->
        <div class="bg-white p-4 rounded-[2.5rem] shadow-2xl border border-gray-100 relative overflow-hidden transition-colors duration-300">
            <!-- Start Screen Overlay -->
            <div id="startScreen" class="absolute inset-0 z-10 bg-black/70 backdrop-blur-md flex flex-col items-center justify-center rounded-[2rem] transition-opacity duration-300">
                <div class="w-20 h-20 bg-teal-500/20 rounded-full flex items-center justify-center mb-6 animate-bounce">
                    <i data-lucide="gamepad-2" class="w-10 h-10 text-teal-400"></i>
                </div>
                <h2 class="text-4xl font-black text-white mb-6 tracking-tight">Ready to Play?</h2>
                <button onclick="startGame()" class="px-10 py-4 bg-gradient-to-r from-teal-400 to-emerald-500 text-white font-bold text-xl rounded-2xl shadow-[0_0_20px_rgba(45,212,191,0.4)] hover:shadow-[0_0_30px_rgba(45,212,191,0.6)] hover:scale-105 transition-all">
                    Start Game
                </button>
            </div>
            
            <!-- Canvas uses bg-gray-50 so the dark mode interceptor changes it seamlessly -->
            <canvas id="gameCanvas" width="800" height="500" class="w-full h-[500px] bg-gray-50 rounded-[2rem] border-2 border-dashed border-gray-200 transition-colors duration-300"></canvas>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const startScreen = document.getElementById('startScreen');
    
    let isPlaying = false;
    let score = 0;
    let items = [];
    let speedMultiplier = 1;
    let animationId;

    // Player (The Basket)
    const player = { x: 350, y: 430, width: 100, height: 60, speed: 8 };

    // Game Assets
    const healthyItems = ['🍎', '🥦', '🥑', '🥕', '🍌', '💧'];
    const junkItems = ['🍔', '🍟', '🍕', '🍩', '🍬'];

    // Input handling
    let rightPressed = false;
    let leftPressed = false;

    document.addEventListener("keydown", (e) => {
        if(e.key === "Right" || e.key === "ArrowRight") rightPressed = true;
        else if(e.key === "Left" || e.key === "ArrowLeft") leftPressed = true;
    });

    document.addEventListener("keyup", (e) => {
        if(e.key === "Right" || e.key === "ArrowRight") rightPressed = false;
        else if(e.key === "Left" || e.key === "ArrowLeft") leftPressed = false;
    });

    // Touch controls for mobile
    canvas.addEventListener("touchstart", (e) => {
        const rect = canvas.getBoundingClientRect();
        const touchX = e.touches[0].clientX - rect.left;
        if(touchX > canvas.width/2) rightPressed = true;
        else leftPressed = true;
        e.preventDefault(); // Prevent scrolling while playing
    }, {passive: false});
    
    canvas.addEventListener("touchend", (e) => {
        rightPressed = false; 
        leftPressed = false;
        e.preventDefault();
    }, {passive: false});

    function spawnItem() {
        if(!isPlaying) return;
        const isHealthy = Math.random() > 0.4; // 60% chance for healthy
        const emojiList = isHealthy ? healthyItems : junkItems;
        const emoji = emojiList[Math.floor(Math.random() * emojiList.length)];
        
        items.push({
            x: Math.random() * (canvas.width - 60) + 10, // Keep away from exact edges
            y: -40,
            emoji: emoji,
            isHealthy: isHealthy,
            speed: (Math.random() * 3 + 2) * speedMultiplier
        });
        
        // Spawn faster over time as score increases
        setTimeout(spawnItem, Math.max(400, 1500 - (score * 15)));
    }

    function update() {
        if(!isPlaying) return;

        // Move Player
        if (rightPressed && player.x < canvas.width - player.width) player.x += player.speed;
        if (leftPressed && player.x > 0) player.x -= player.speed;

        // Move Items & Check Collision
        for (let i = 0; i < items.length; i++) {
            let item = items[i];
            item.y += item.speed;

            // Collision Detection
            if (item.y + 30 > player.y && item.y < player.y + player.height &&
                item.x + 30 > player.x && item.x < player.x + player.width) {
                
                if (item.isHealthy) {
                    score += 10;
                    speedMultiplier += 0.05; // Game gets slightly faster
                } else {
                    score -= 15; // Penalty for junk
                    if(score < 0) score = 0;
                }
                
                // Add pop animation class to score
                scoreDisplay.innerText = score;
                scoreDisplay.classList.remove('scale-110');
                void scoreDisplay.offsetWidth; // trigger reflow
                scoreDisplay.classList.add('scale-110', 'transition-transform');
                setTimeout(() => scoreDisplay.classList.remove('scale-110'), 200);

                items.splice(i, 1);
                i--;
            } 
            // Remove items that hit bottom
            else if (item.y > canvas.height) {
                items.splice(i, 1);
                i--;
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Check if dark mode is active to style the basket differently
        const isDark = document.body.classList.contains('dark-theme');

        // Draw Player (Basket)
        ctx.fillStyle = isDark ? '#b45309' : '#8B4513'; // Lighter brown in dark mode
        ctx.beginPath();
        ctx.roundRect(player.x, player.y, player.width, player.height, 10);
        ctx.fill();
        
        // Basket trim
        ctx.fillStyle = isDark ? '#d97706' : '#A0522D'; 
        ctx.fillRect(player.x - 5, player.y, player.width + 10, 15);

        // Draw Items (Emojis)
        ctx.font = '40px Arial';
        ctx.textAlign = 'center';
        items.forEach(item => {
            ctx.fillText(item.emoji, item.x + 20, item.y + 35);
        });
    }

    function gameLoop() {
        update();
        draw();
        if(isPlaying) {
            animationId = requestAnimationFrame(gameLoop);
        }
    }

    function startGame() {
        startScreen.classList.add('opacity-0', 'pointer-events-none');
        setTimeout(() => {
            isPlaying = true;
            score = 0;
            speedMultiplier = 1;
            items = [];
            scoreDisplay.innerText = score;
            spawnItem();
            gameLoop();
        }, 300);
    }
</script>
{% endblock %}
